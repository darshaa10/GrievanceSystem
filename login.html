<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Grievance Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-bg">
    <div class="container">
        <div class="glass-card">
            <h2 id="auth-title">Citizen Login</h2>
            <form id="login-form">
                <div id="signup-fields"></div> <div class="input-group">
                    <input type="email" id="email" placeholder="Email Address" required>
                </div>
                <div class="input-group">
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                <div class="form-footer">
                    <a href="#" id="forgot-pw">Forgot Password?</a>
                </div>
                <button type="submit" class="btn-primary">Sign In</button>
            </form>
            <p class="switch-text">New user? <a href="#" id="toggle-auth">Create Account</a></p>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
